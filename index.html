<html lang="en">
<head>
<meta charset="UTF-8">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #080c1c;
    color: white;
    overscroll-behavior: none;
  }
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    z-index: 0;
    pointer-events: none;
  }
  body::before {
    width: 900px; height: 900px;
    top: -300px; left: -250px;
    background: radial-gradient(circle, rgba(0,212,255,0.35) 0%, rgba(0,212,255,0.08) 40%, transparent 70%);
    animation: float1 26s ease-in-out infinite alternate;
  }
  body::after {
    width: 800px; height: 800px;
    bottom: -280px; right: -220px;
    background: radial-gradient(circle, rgba(139,92,246,0.32) 0%, rgba(139,92,246,0.08) 40%, transparent 70%);
    animation: float2 28s ease-in-out infinite alternate;
  }
  @keyframes float1 { to { transform: translate(120px, 80px) scale(1.1); } }
  @keyframes float2 { to { transform: translate(-100px, -70px) scale(1.15); } }
  
  .grid-bg {
    position: absolute; inset: 0;
    background-image: 
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse at center, black 40%, transparent 70%);
  }
  
  .glass {
    background: linear-gradient(180deg, rgba(255,255,255,0.09), rgba(255,255,255,0.03));
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  
  .slide {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 2rem;
    opacity: 0; pointer-events: none;
    transition: opacity 0.7s cubic-bezier(0.4,0,0.2,1), transform 0.7s cubic-bezier(0.4,0,0.2,1);
    transform: scale(0.96) translateY(20px);
    z-index: 10;
  }
  .slide.active {
    opacity: 1; pointer-events: auto;
    transform: scale(1) translateY(0);
  }
  
  .aurora-text {
    background: linear-gradient(90deg, #00d4ff 0%, #8b5cf6 50%, #00d4ff 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 8s linear infinite;
  }
  @keyframes shine { to { background-position: 200% center; } }
  
  .progress {
    position: fixed; top: 0; left: 0; height: 3px; z-index: 50;
    background: linear-gradient(90deg, #00d4ff, #8b5cf6);
    box-shadow: 0 0 20px rgba(0,212,255,0.6);
    transition: width 0.4s ease;
  }

  .mono { font-family: 'JetBrains Mono', monospace; }

  @media print {
    html, body { overflow: visible !important; background: white !important; }
    body::before, body::after, .progress, #hint, #slideNum { display: none !important; }
    .slide { position: relative !important; opacity: 1 !important; transform: none !important; height: 100vh; page-break-after: always; background: #080c1c !important; }
    .glass { border: 1px solid #333 !important; }
  }
</style>
</head>

}

        </div>

    </div>`;
  slidesEl.appendChild(slide);

const slides = Array.from(document.querySelectorAll('.slide'));
let current = 0;
const total = slides.length;
const progress = document.getElementById('progress');
const slideNum = document.getElementById('slideNum');

function show(i) {
  current = Math.max(0, Math.min(total-1, i));
  slides.forEach((s, idx) => s.classList.toggle('active', idx === current));
  progress.style.width = `${((current+1)/total)*100}%`;
  slideNum.textContent = `${String(current+1).padStart(2,'0')} / ${String(total).padStart(2,'0')}`;
  location.hash = `s${current+1}`;
}
function next() { show(current+1); }
function prev() { show(current-1); }

window.addEventListener('keydown', e => {
  if(['ArrowRight','ArrowDown','PageDown',' '].includes(e.key)) { e.preventDefault(); next(); }
  if(['ArrowLeft','ArrowUp','PageUp'].includes(e.key)) { e.preventDefault(); prev(); }
  if(e.key==='Home') show(0);
  if(e.key==='End') show(total-1);
});

let sx=0;
window.addEventListener('touchstart', e => sx = e.touches[0].clientX, {passive:true});
window.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - sx;
  if(Math.abs(dx) > 50) dx < 0 ? next() : prev();
}, {passive:true});

window.addEventListener('click', e => {
  if(e.target.closest('a,button')) return;
  const mid = window.innerWidth/2;
  e.clientX > mid ? next() : prev();
});

const initial = parseInt(location.hash.replace('#s','')) - 1;
show(isNaN(initial) ? 0 : initial);

// Preload next for smoothness
setInterval(() => {
  const nextSlide = slides[current+1];
  if(nextSlide) nextSlide.style.willChange = 'opacity, transform';
}, 1000);
</script>
